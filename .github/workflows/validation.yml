name: Validate template project
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  build:
    name: Build and package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            11.0.x
            10.0.x
      - name: Format
        run: dotnet format templates.csproj --severity info --verify-no-changes
      - name: Build
        run: dotnet build --configuration release
      - name: Pack
        run: dotnet pack --configuration release --output ./pkg
      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: template-package
          path: pkg/*.nupkg
  test:
    name: Test (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: console-default
            template: console-file
            arguments: ""
            checks: |
              test -f console.cs
              dotnet run console.cs
          - scenario: console-plain
            template: console-file
            arguments: --plain
            checks: |
              test -f console.cs
              grep -q "Console.WriteLine" console.cs
          - scenario: webapi-file
            template: webapi-file
            arguments: ""
            checks: |
              test -f api.cs
              test -f api.http
              dotnet build api.cs
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: template-package
          path: ./pkg
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            11.0.x
            10.0.x
      - name: Install template package
        run: dotnet new install ./pkg/dotnet-file-based-app-templates.*.nupkg
      - name: Verify template list by tag
        run: dotnet new list --tag file-based
      - name: Run smoke test and record result
        shell: bash
        run: |
          start=$(date +%s%3N)
          status=passed
          mkdir -p smoke/${{ matrix.scenario }}
          cd smoke/${{ matrix.scenario }}
          if ! (
            dotnet new ${{ matrix.template }} ${{ matrix.arguments }}
            ${{ matrix.checks }}
          ); then
            status=failed
          fi
          stop=$(date +%s%3N)
          duration_ms=$((stop - start))
          cd ../..
          mkdir -p results
          cat > results/${{ matrix.scenario }}.json <<EOF
          {
            "scenario": "${{ matrix.scenario }}",
            "template": "${{ matrix.template }}",
            "arguments": "${{ matrix.arguments }}",
            "status": "$status",
            "duration_ms": $duration_ms
          }
          EOF
          if [ "$status" != "passed" ]; then
            exit 1
          fi
      - name: Upload test result artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-result-${{ matrix.scenario }}
          path: results/${{ matrix.scenario }}.json
          retention-days: 1
  gate:
    name: Test passed
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() }}
    steps:
      - name: Download test result artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: test-result-*
          path: ./results
          merge-multiple: true
      - name: Write test summary
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result_files = sorted(Path('results').glob('*.json'))
          rows = [json.loads(path.read_text(encoding='utf-8')) for path in result_files]
          passed = sum(1 for row in rows if row['status'] == 'passed')
          failed = sum(1 for row in rows if row['status'] != 'passed')

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
            summary.write('## Smoke test summary\n')
            summary.write(f'Passed: {passed}  Failed: {failed}\n\n')
            summary.write('| Scenario | Template | Arguments | Status | Duration (ms) |\n')
            summary.write('| --- | --- | --- | --- | ---: |\n')
            for row in rows:
              arguments = row['arguments'] or '(default)'
              summary.write(
                f"| {row['scenario']} | {row['template']} | {arguments} | {row['status']} | {row['duration_ms']} |\n"
              )
          PY
      - name: Fail when any matrix job does not succeed
        shell: bash
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Test matrix result: ${{ needs.test.result }}"
            exit 1
          fi
