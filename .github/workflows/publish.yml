name: Publish package to NuGet
on:
  release:
    types: [released]
jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      GH_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Download package from release
        shell: bash
        run: |
          mkdir -p ./pkg
          gh release download "${{ github.event.release.tag_name }}" --pattern "*.nupkg" --dir ./pkg
      - name: NuGet login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USERNAME }}
      - name: Publish package to NuGet.org
        run: dotnet nuget push ./pkg/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
