name: Create GitHub release
on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version
        required: true
        type: string
jobs:
  package:
    name: Build package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            11.0.x
            10.0.x
      - name: Pack
        run: dotnet pack --configuration release --output ./pkg -p:PackageVersion=${{ inputs.version }}
      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: template-package
          path: pkg/*.nupkg
  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
      GH_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Download package
        uses: actions/download-artifact@v8
        with:
          name: template-package
          path: ./pkg
      - name: Get GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.NUGET_APP_ID }}
          private-key: ${{ secrets.NUGET_APP_PRIVATE_KEY }}
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          gh release create "v${{ inputs.version }}" --target "${{ github.sha }}" --draft --generate-notes
      - name: Upload package to release
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          gh release upload "v${{ inputs.version }}" ./pkg/*.nupkg --clobber
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          gh release edit "v${{ inputs.version }}" --draft=false
